name: Deploy to GitHub Pages

on:
  push:
    # main 또는 master 브랜치에 푸시될 때 워크플로우 실행
    branches: [ main, master ]
  # GitHub 웹 UI에서 수동으로 실행 가능하도록 설정
  workflow_dispatch:

# GitHub Pages 배포를 위한 권한 부여
permissions:
  contents: read
  pages: write
  id-token: write

# 여러 빌드가 겹칠 경우 이전 빌드를 취소하여 충돌 방지
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # package.json의 node >=22.12.0 명세에 부합하도록 최신 안정화 버전 매칭
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
