<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
      <rect x="0" y="0" width="120" height="120" fill="#ffffff" />

      <g transform="translate(-8.25, 0)">

        <!-- 마크: 데이터 유성 (Data Meteor) -->
        <!-- 68.25, 60을 중심으로 -45도 회전하여 우상단으로 향하는 유성 형태 구성 -->
        <g transform="rotate(-45 68.25 60)">
          <!-- 꼬리 부분 -->
          <rect x="14" y="52.5" width="12" height="15" rx="6" fill="#0f172a" opacity="0.25" />
          <rect x="34" y="40" width="12" height="40" rx="6" fill="#1e3a8a" opacity="0.55" />

          <!-- 중간 몸체 -->
          <rect x="54" y="27.5" width="12" height="65" rx="6" fill="#2563eb" opacity="0.82" />

          <!-- 메인 코어 (가장 긴 막대) -->
          <rect x="74" y="15" width="12" height="90" rx="6" fill="#0ea5e9" opacity="0.96" />

          <!-- 선두 충격파 -->
          <rect x="94" y="35" width="12" height="50" rx="6" fill="#38bdf8" opacity="1" />

          <!-- 진행 방향의 선두 입자 -->
          <circle cx="118" cy="60" r="4.5" fill="#bae6fd" />
        </g>

      </g>

    </svg>
